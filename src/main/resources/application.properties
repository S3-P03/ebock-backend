quarkus.http.host=0.0.0.0
quarkus.http.port=8888
quarkus.http.root-path=/api
quarkus.http.non-application-root-path=/q

# OIDC config (adapté à Keycloak)
quarkus.oidc.auth-server-url=${KEYCLOAK_URL}/realms/ebock
quarkus.oidc.client-id=${BACKEND_KEYCLOAK_CLIENT_ID}
quarkus.oidc.credentials.secret=${BACKEND_KEYCLOAK_SECRET}
quarkus.oidc.application-type=service
quarkus.oidc.authentication.redirect-path=/callback

# config pour les tests
%test.quarkus.oidc.enabled=false
%test.quarkus.oidc.connection-delay=0S
%test.quarkus.oidc.token.verify-access-token-with-user-info=false
#%test.mp.jwt.verify.publickey.location=test-public-key.pem
%test.mp.jwt.verify.publickey=MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgBAQAB
%test.mp.jwt.verify.issuer=test-issuer
%test.quarkus.oidc.auth-server-url=http://localhost/realms/test
%test.quarkus.oidc.client-id=test-client
%test.quarkus.oidc.credentials.secret=test-secret
%test.quarkus.http.cors.origins=http://localhost:3000
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.active=false
%test.quarkus.hibernate-orm.active=false
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.sql-load-script=import.sql

# Autorise tous
quarkus.http.auth.permission.secured.paths=/api/*
quarkus.http.auth.permission.secured.policy=authenticated

# Gestion des cross origin
quarkus.http.cors.enabled=true
quarkus.http.cors.exposed-headers=location,info
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.origins=${CORS_ORIGINS}
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept

# Source de données
quarkus.datasource.devservices.enabled=false
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/postgres
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.leak-detection-interval=5M
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}

# Mapping object relationnal
quarkus.mybatis.xmlconfig.enable=false
quarkus.mybatis.map-underscore-to-camel-case=true

# Permettre l'utilisation de swagger
quarkus.http.auth.permission.swagger.paths=/q/swagger-ui,/q/swagger-ui/*,/q/openapi
quarkus.http.auth.permission.swagger.policy=permit

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.oauth-client-id=${BACKEND_KEYCLOAK_CLIENT_ID}
quarkus.swagger-ui.oauth-client-secret=${BACKEND_KEYCLOAK_SECRET}
quarkus.swagger-ui.oauth-flow=authorizationCode
quarkus.swagger-ui.oauth-authorization-url=${KEYCLOAK_URL}/realms/ebock/protocol/openid-connect/auth
quarkus.swagger-ui.oauth-token-url=${KEYCLOAK_URL}/realms/ebock/protocol/openid-connect/token
quarkus.swagger-ui.oauth-use-pkce=true

quarkus.smallrye-openapi.security-scheme=oidc
quarkus.smallrye-openapi.oidc-open-id-connect-url=http://localhost:8180/realms/ebock/.well-known/openid-configuration

#Pour en prod
%prod.quarkus.http.auth.permission.swagger-ui.paths=/q/swagger-ui,/q/swagger-ui/*
%prod.quarkus.http.auth.permission.swagger-ui.policy=authenticated